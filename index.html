<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/webp" href="logo.webp">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphy — Carino Systems</title>
    <link rel="stylesheet" href="fonts/carino-fonts.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- Slim app toolbar (functional controls only). Canonical Carino navbar is injected above by carino-navbar.js -->
<header class="graphy-caption">
  <div class="header-left">
    <div class="graph-info">
      <span id="title">Loading...</span>
      <span id="description">Please wait while we load the content.</span>
    </div>
  </div>

  <div class="header-right" data-carino-actions>
    <div class="topic-selector">
      <button id="load-json-files">Select Topic ▼</button>
      <ul id="json-list"></ul>
    </div>
    <div id="buttons"></div>
  </div>
</header>

<div id="chart"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="assets/js/script.js"></script>
<script src="carino-navbar.js" data-app="Graphy" defer></script>
</body>
</html>
